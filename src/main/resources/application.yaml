
#spring.application.name=concessionaria
#server.port=8081
server:
  port: 8091
spring:
  datasource:
    url: jdbc:h2:mem:concessionaria
    username: sa
    password: 123456
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  application:
    name: concessionaria
